<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1학년 2반 미라클 6월 🌟</title>
  <link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:#3B41C5; --glow:#6366f1; --accent:#F59E0B;
      --green:#10B981; --red:#EF4444;
      --bg:#0F0E1A; --surface:#1A1928; --surface2:#22203A;
      --border:rgba(255,255,255,0.08);
      --text:#F0EEFF; --muted:#8884A8;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    /* ── Loading ── */
    .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;color:var(--muted);}
    .spinner{width:48px;height:48px;border:3px solid rgba(99,102,241,0.2);border-top-color:#6366f1;border-radius:50%;animation:spin 0.9s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── Login ── */
    .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 30% 20%,rgba(99,102,241,0.15) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(245,158,11,0.1) 0%,transparent 60%),var(--bg);padding:24px;}
    .login-card{background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:56px 48px;text-align:center;max-width:400px;width:100%;position:relative;overflow:hidden;}
    .login-card::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(99,102,241,0.25) 0%,transparent 70%);pointer-events:none;}
    .login-star{font-size:64px;margin-bottom:20px;}
    .login-title{font-family:'Gmarket Sans',sans-serif;font-size:32px;font-weight:700;background:linear-gradient(135deg,#A5B4FC,#6366F1,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
    .login-sub{font-size:14px;color:var(--muted);margin-bottom:40px;}
    .btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:14px;color:var(--text);font-size:15px;font-weight:700;cursor:pointer;transition:all 0.25s;font-family:'Noto Sans KR',sans-serif;}
    .btn-google:hover{background:rgba(99,102,241,0.15);border-color:rgba(99,102,241,0.4);transform:translateY(-2px);}

    /* ── Header ── */
    .header{background:rgba(26,25,40,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .header-left{display:flex;align-items:center;gap:14px;}
    .header-title{font-family:'Gmarket Sans',sans-serif;font-size:18px;font-weight:700;}
    .header-sub{font-size:11px;color:var(--muted);margin-top:2px;}
    .btn-back{background:rgba(255,255,255,0.08);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:700;transition:all 0.2s;font-family:'Noto Sans KR',sans-serif;}
    .btn-back:hover{background:rgba(255,255,255,0.14);}
    .header-right{display:flex;align-items:center;gap:10px;}
    .user-avatar{width:34px;height:34px;border-radius:50%;border:2px solid rgba(99,102,241,0.5);}
    .user-name{font-size:13px;color:var(--muted);}
    .badge-teacher{background:linear-gradient(135deg,#F59E0B,#EF4444);color:white;border-radius:8px;padding:3px 10px;font-size:11px;font-weight:900;letter-spacing:0.5px;}
    .btn-signout{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;transition:all 0.2s;font-family:'Noto Sans KR',sans-serif;}
    .btn-signout:hover{border-color:var(--red);color:var(--red);}

    /* ── Main ── */
    .main-wrap{max-width:1200px;margin:0 auto;padding:32px 24px 80px;}
    .section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;margin-top:36px;}

    /* ── Admin ── */
    .admin-panel{background:rgba(245,158,11,0.08);border:1px dashed rgba(245,158,11,0.4);border-radius:18px;padding:20px 22px;}
    .admin-title{font-size:12px;font-weight:900;color:#FBBF24;margin-bottom:14px;letter-spacing:1px;text-transform:uppercase;}
    .admin-row{display:flex;gap:10px;flex-wrap:wrap;}
    .admin-input{background:rgba(255,255,255,0.06);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);flex:1;min-width:120px;font-family:'Noto Sans KR',sans-serif;transition:border-color 0.2s;}
    .admin-input:focus{outline:none;border-color:#FBBF24;}
    .admin-input::placeholder{color:var(--muted);}
    .btn-admin{background:linear-gradient(135deg,#F59E0B,#D97706);color:white;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}

    /* ── Calendar ── */
    .cal-outer{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:36px;}
    .cal-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
    .cal-month-label{font-family:'Gmarket Sans',sans-serif;font-size:16px;font-weight:700;color:var(--glow);}
    .btn-cal-edit{background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:var(--glow);border-radius:10px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;}
    .btn-cal-edit:hover{background:rgba(99,102,241,0.25);}
    .btn-cal-save{background:var(--glow);border:none;color:white;border-radius:10px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
    .cal-header-row{display:grid;grid-template-columns:repeat(7,1fr);background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);}
    .cal-header-cell{text-align:center;font-size:11px;font-weight:900;color:var(--muted);padding:8px 4px;letter-spacing:1px;}
    .cal-header-cell.sun{color:rgba(239,68,68,0.8);}
    .cal-header-cell.sat{color:#818CF8;}
    .cal-week-row{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid var(--border);}
    .cal-cell{border-right:1px solid var(--border);padding:10px 8px;min-height:84px;position:relative;}
    .cal-cell:last-child{border-right:none;}
    .cal-cell.empty{background:rgba(0,0,0,0.15);}
    .cal-date{font-size:12px;font-weight:900;color:var(--muted);margin-bottom:5px;font-family:'Gmarket Sans',sans-serif;}
    .cal-cell.sun-col .cal-date{color:rgba(239,68,68,0.7);}
    .cal-cell.sat-col .cal-date{color:#818CF8;}
    .cal-cell.holiday .cal-date{color:var(--red);}
    .cal-text{font-size:11.5px;font-weight:600;line-height:1.5;color:var(--text);white-space:pre-line;}
    .cal-cell.holiday .cal-text{color:var(--red);}

    .cal-week-yellow .cal-cell:not(.empty){background:rgba(251,191,36,0.06);}
    .cal-week-green  .cal-cell:not(.empty){background:rgba(52,211,153,0.06);}
    .cal-week-blue   .cal-cell:not(.empty){background:rgba(99,102,241,0.06);}
    .cal-week-purple .cal-cell:not(.empty){background:rgba(192,132,252,0.06);}
    .cal-week-yellow .cal-cell.has-content{background:rgba(251,191,36,0.12);}
    .cal-week-green  .cal-cell.has-content{background:rgba(52,211,153,0.12);}
    .cal-week-blue   .cal-cell.has-content{background:rgba(99,102,241,0.12);}
    .cal-week-purple .cal-cell.has-content{background:rgba(192,132,252,0.12);}

    .cal-cell.editable{cursor:pointer;}
    .cal-cell.editable:hover{filter:brightness(1.4);}
    textarea.cal-input{width:100%;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.35);border-radius:6px;padding:4px 6px;font-size:11px;color:var(--text);font-family:'Noto Sans KR',sans-serif;resize:none;height:56px;margin-top:2px;}
    textarea.cal-input:focus{outline:none;border-color:var(--glow);}

    /* ── Students ── */
    .student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px;}
    .student-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px 14px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;}
    .student-card:hover{border-color:var(--glow);background:var(--surface2);transform:translateY(-3px);box-shadow:0 12px 32px rgba(99,102,241,0.2);}
    .student-card.is-me{border-color:var(--green);box-shadow:0 0 16px rgba(16,185,129,0.15);}
    .student-num{font-size:11px;color:var(--muted);margin-bottom:10px;font-weight:700;}
    .student-icon{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,rgba(99,102,241,0.4),rgba(99,102,241,0.8));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:white;margin:0 auto 10px;font-family:'Gmarket Sans',sans-serif;}
    .student-name{font-size:14px;font-weight:700;}
    .student-email{font-size:10px;color:var(--muted);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .active-dot{position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
    .empty-state{text-align:center;padding:60px;color:var(--muted);grid-column:1/-1;}
    .empty-state .em{font-size:48px;margin-bottom:12px;}

    /* ── Student Page ── */
    .student-wrap{max-width:1500px;margin:0 auto;padding:28px 20px 110px;}
    .monthly-section{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:24px;}
    .monthly-label{font-size:11px;font-weight:900;color:var(--glow);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;}
    textarea.monthly-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:16px;font-weight:700;color:var(--text);font-family:'Noto Sans KR',sans-serif;resize:none;min-height:72px;transition:border-color 0.2s;line-height:1.6;}
    textarea.monthly-input:focus{outline:none;border-color:var(--glow);}
    textarea.monthly-input:disabled{opacity:0.7;cursor:default;}
    .weeks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    @media(max-width:900px){.weeks-grid{grid-template-columns:1fr;}}
    .week-col{border-radius:20px;padding:20px;border:1px solid;}
    .week-col.w1{background:#1E1A3F;border-color:rgba(129,140,248,0.2);}
    .week-col.w2{background:#142E2A;border-color:rgba(52,211,153,0.2);}
    .week-col.w3{background:#2D1E0F;border-color:rgba(251,191,36,0.2);}
    .week-title{font-family:'Gmarket Sans',sans-serif;font-size:20px;font-weight:700;margin-bottom:2px;}
    .week-col.w1 .week-title{color:#818CF8;}
    .week-col.w2 .week-title{color:#34D399;}
    .week-col.w3 .week-title{color:#FBBF24;}
    .week-dates-label{font-size:11px;color:var(--muted);margin-bottom:14px;}
    textarea.week-goal{width:100%;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 12px;font-size:14px;font-weight:700;color:var(--text);font-family:'Noto Sans KR',sans-serif;resize:none;min-height:52px;margin-bottom:14px;transition:border-color 0.2s;line-height:1.5;}
    textarea.week-goal:focus{outline:none;border-color:rgba(255,255,255,0.3);}
    textarea.week-goal:disabled{opacity:0.7;cursor:default;}
    .day-cell{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px;margin-bottom:8px;}
    .day-header{font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
    .day-cell.sat{border-color:rgba(239,68,68,0.2);}
    .day-cell.sat .day-header{color:rgba(239,68,68,0.8);}
    textarea.day-text{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text);font-family:'Noto Sans KR',sans-serif;resize:none;min-height:54px;transition:border-color 0.2s;line-height:1.5;}
    textarea.day-text:focus{outline:none;border-color:rgba(255,255,255,0.25);}
    textarea.day-text:disabled{opacity:0.7;cursor:default;}
    textarea.day-text::placeholder{color:rgba(136,132,168,0.6);}
    .photo-wrap{margin-top:8px;}
    .photo-preview-img{width:100%;border-radius:8px;object-fit:cover;max-height:130px;margin-top:6px;border:1px solid rgba(255,255,255,0.1);}
    label.btn-photo{display:flex;align-items:center;justify-content:center;gap:4px;width:100%;margin-top:6px;padding:6px;background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.15);border-radius:8px;font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.2s;}
    label.btn-photo:hover{border-color:var(--glow);color:var(--glow);}
    .save-bar{position:fixed;bottom:24px;right:24px;z-index:200;}
    .btn-save{background:linear-gradient(135deg,#4F46E5,#7C3AED);color:white;border:none;border-radius:20px;padding:14px 32px;font-size:15px;font-weight:900;cursor:pointer;box-shadow:0 6px 28px rgba(99,102,241,0.5);font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;}
    .btn-save:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(99,102,241,0.6);}
    .view-banner{background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);border-radius:12px;padding:10px 16px;margin-bottom:20px;font-size:13px;color:var(--green);font-weight:700;display:flex;align-items:center;gap:8px;}
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(30,28,50,0.95);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);color:var(--text);border-radius:14px;padding:12px 24px;font-size:14px;font-weight:700;z-index:300;opacity:0;transition:opacity 0.3s,transform 0.3s;white-space:nowrap;pointer-events:none;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .btn-primary{background:linear-gradient(135deg,var(--primary),#7C3AED);color:white;border:none;border-radius:12px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;}
  </style>
</head>
<body>
<div id="app">
  <div class="loading-screen"><div class="spinner"></div><div style="font-size:14px">로딩 중...</div></div>
</div>
<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut }
                           from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, orderBy, where }
                           from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── Config ──────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBCZ8zOt6vy85QeuM2tmc1l0SbvLCgI4DI",
  authDomain:        "project-7495985191493746478.firebaseapp.com",
  projectId:         "project-7495985191493746478",
  storageBucket:     "project-7495985191493746478.firebasestorage.app",
  messagingSenderId: "677977589186",
  appId:             "1:677977589186:web:4e7eebc230be8dad2c825b"
};
// 교사 이메일 목록 (추가 가능)
const TEACHER_EMAILS = [
  'rapidwing@snu-g.ms.kr',
];
// 재배포 후 새 URL로 교체 (script.google.com/macros/s/.../exec 형태)
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzHvOcOlqSCErbyuPFa_VDYp814ttx9LHgDVJZ4CK3Gt8dGoVXTH9KGknm9lVahYlkocA/exec';

// ── 달력 데이터 ──────────────────────────────────────────────
// June 2026: 6/1 = 월요일 → 일~토 형식
const CAL_WEEKS = [
  { days:[null,1,2,3,4,5,6],       color:'yellow' },
  { days:[7,8,9,10,11,12,13],      color:'green'  },
  { days:[14,15,16,17,18,19,20],   color:'blue'   },
  { days:[21,22,23,24,25,26,27],   color:'purple' },
  { days:[28,29,30,null,null,null,null], color:'none' },
];
const CAL_DEFAULTS = {
  1:{text:'1일 목표\n세우기'},
  2:{text:'주간 목표\n세우기'},
  3:{text:'지방선거일',holiday:true},
  4:{text:'하루 목표\n세우기'},
  5:{text:'자기 목표\n발표하기'},
  8:{text:'1주차'},
  9:{text:'목표'},
  10:{text:'실천하기'},
  13:{text:'1주차 활동\n반성하기'},
  15:{text:'2주차'},
  16:{text:'목표'},
  17:{text:'실천하기'},
  20:{text:'2주차 활동\n반성하기'},
  22:{text:'3주차'},
  23:{text:'목표'},
  24:{text:'실천하기'},
  27:{text:'3주차 활동\n반성하기'},
  29:{text:'활동 결과\n발표하기'},
};

const WEEKS = [
  {num:1,label:'1주차',dates:'6/8 ~ 6/13', cls:'w1'},
  {num:2,label:'2주차',dates:'6/15 ~ 6/20',cls:'w2'},
  {num:3,label:'3주차',dates:'6/22 ~ 6/27',cls:'w3'},
];
const DAYS = [
  {key:'mon',label:'MON 월',sat:false},
  {key:'tue',label:'TUE 화',sat:false},
  {key:'wed',label:'WED 수',sat:false},
  {key:'thu',label:'THU 목',sat:false},
  {key:'fri',label:'FRI 금',sat:false},
  {key:'sat',label:'SAT 토 — 주차 반성',sat:true},
];

// ── Firebase ─────────────────────────────────────────────────
const fbApp    = initializeApp(FIREBASE_CONFIG);
const auth     = getAuth(fbApp);
const db       = getFirestore(fbApp);
const gProv    = new GoogleAuthProvider();

let currentUser = null, userProfile = null;
let studentList = [], sessionData = {}, calData = {};
let calEditMode = false;

// ── 유틸 ─────────────────────────────────────────────────────
const isTeacher = u => u?.email && TEACHER_EMAILS.includes(u.email.toLowerCase());
const canEdit   = id => currentUser && (isTeacher(currentUser) || userProfile?.studentId===id);
let toastT = null;
function showToast(msg,dur=2600){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),dur);
}
function setApp(h){document.getElementById('app').innerHTML=h;}
function autoResize(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
function initAutoResize(){document.querySelectorAll('textarea').forEach(ta=>{ta.addEventListener('input',()=>autoResize(ta));autoResize(ta);});}

// ── Firestore ─────────────────────────────────────────────────
async function loadStudents(){
  try{
    const s=await getDocs(query(collection(db,'students'),orderBy('number')));
    studentList=s.docs.map(d=>({id:d.id,...d.data()}));
  }catch{studentList=[];}
  return studentList;
}
async function findByEmail(email){
  try{
    const s=await getDocs(query(collection(db,'students'),where('email','==',email.toLowerCase())));
    if(s.empty)return null;
    const d=s.docs[0]; return {id:d.id,...d.data()};
  }catch{return null;}
}
async function loadGoals(id){
  const s=await getDoc(doc(db,'goals',id));
  return s.exists()?s.data():{};
}
async function saveGoals(id,data){await setDoc(doc(db,'goals',id),data);}
async function loadCalendar(){
  const s=await getDoc(doc(db,'schedule','june2026'));
  calData=s.exists()?(s.data().cells||{}):{};
}
async function saveCalendar(){await setDoc(doc(db,'schedule','june2026'),{cells:calData});}

// ── 사진 업로드 (GAS → Drive) ────────────────────────────────
function compressImage(file,maxW=1000,q=0.75){
  return new Promise(res=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      const sc=Math.min(1,maxW/img.width);
      const cv=document.createElement('canvas');
      cv.width=img.width*sc; cv.height=img.height*sc;
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      cv.toBlob(res,'image/jpeg',q); URL.revokeObjectURL(url);
    };
    img.src=url;
  });
}
async function uploadPhoto(sid,week,day,file){
  const c=await compressImage(file);
  const b64=await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej;
    r.readAsDataURL(c);
  });
  const resp=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({idToken:await currentUser.getIdToken(),
    image:b64, filename:`${sid}_w${week}_${day}_${Date.now()}.jpg`, mimeType:'image/jpeg'
  })});
  const j=await resp.json();
  if(!j.success)throw new Error(j.error);
  return j.url;
}

// ── 달력 HTML 생성 ────────────────────────────────────────────
function buildCalendar(teacher){
  const headers=['일','월','화','수','목','금','토'].map((h,i)=>
    `<div class="cal-header-cell ${i===0?'sun':i===6?'sat':''}">${h}</div>`
  ).join('');

  const weeksHtml=CAL_WEEKS.map(wk=>{
    const cells=wk.days.map((day,ci)=>{
      if(day===null) return `<div class="cal-cell empty"></div>`;
      const def=CAL_DEFAULTS[day]||{};
      const isHol=def.holiday||false;
      const saved=calData[day]!==undefined?calData[day]:(def.text||'');
      const hasCnt=saved.trim().length>0;
      const cls=['cal-cell',
        ci===0?'sun-col':ci===6?'sat-col':'',
        isHol?'holiday':'',
        hasCnt?'has-content':'',
        teacher?'editable':''
      ].filter(Boolean).join(' ');

      if(teacher&&calEditMode){
        return `<div class="${cls}" data-day="${day}">
          <div class="cal-date">${day}</div>
          <textarea class="cal-input" data-day="${day}">${saved}</textarea>
        </div>`;
      }
      return `<div class="${cls}">
        <div class="cal-date">${day}</div>
        <div class="cal-text">${saved.replace(/\n/g,'<br>')}</div>
      </div>`;
    }).join('');
    return `<div class="cal-week-row cal-week-${wk.color}">${cells}</div>`;
  }).join('');

  const editBtn=calEditMode
    ?`<button class="btn-cal-save" id="btnCalSave">💾 저장</button>`
    :`<button class="btn-cal-edit" id="btnCalEdit">✏️ 일정 수정</button>`;

  return `
    <div class="section-title" style="margin-top:0">📅 6월 일정표</div>
    <div class="cal-outer">
      <div class="cal-topbar">
        <span class="cal-month-label">2026년 6월 · 미라클 6월</span>
        ${teacher?editBtn:''}
      </div>
      <div class="cal-header-row">${headers}</div>
      ${weeksHtml}
    </div>`;
}

// ── 학생 카드 ─────────────────────────────────────────────────
function renderCards(){
  if(!studentList.length)
    return `<div class="empty-state"><div class="em">👥</div>${isTeacher(currentUser)?'위 패널에서 학생을 추가해주세요.':'학생 목록이 없습니다.'}</div>`;
  return studentList.map(s=>{
    const me=userProfile?.studentId===s.id;
    return `<div class="student-card${me?' is-me':''}" data-sid="${s.id}">
      ${s.uid?'<div class="active-dot"></div>':''}
      <div class="student-num">${s.number}번</div>
      <div class="student-icon">${s.name.charAt(0)}</div>
      <div class="student-name">${s.name}</div>
      <div class="student-email">${s.email||''}</div>
    </div>`;
  }).join('');
}
function attachCards(){
  document.querySelectorAll('.student-card').forEach(c=>
    c.addEventListener('click',()=>renderStudentPage(c.dataset.sid)));
}

        <div>
          <div class="header-title">🌟 미라클 6월</div>
          <div class="header-sub">1학년 2반 · 2026년 6월</div>
        </div>
        ${teacher?'<span class="badge-teacher">교사</span>':''}
      </div>
      <div class="header-right">
        ${currentUser.photoURL?`<img class="user-avatar" src="${currentUser.photoURL}" referrerpolicy="no-referrer">`:''}
        <span class="user-name">${teacher?currentUser.displayName:(userProfile?.name||'')}</span>
        <button class="btn-signout" id="btnSO">로그아웃</button>
      </div>
    </div>

    <div class="main-wrap">

        <div class="section-title" style="margin-top:0">🔧 교사 관리 — 학생 등록</div>

            <input class="admin-input" id="aN" type="number" placeholder="출석번호" min="1" max="40" style="max-width:90px">
            <input class="admin-input" id="aName" placeholder="이름">
            <input class="admin-input" id="aEmail" type="email" placeholder="학생 Google 이메일 (예: student@gmail.com)" style="flex:2">
            <button class="btn-admin" id="btnAdd">+ 추가</button>
          </div>
        </div>
      `:''}

      ${buildCalendar(teacher)}

      <div class="section-title">👥 우리 반 친구들</div>
      <div class="student-grid" id="grid">${renderCards()}</div>
    </div>
  `);

  document.getElementById('btnSO').addEventListener('click',()=>signOut(auth));

  if(teacher){
    // 학생 추가
    document.getElementById('btnAdd').addEventListener('click',async()=>{
      const n=parseInt(document.getElementById('aN').value);
      const name=document.getElementById('aName').value.trim();
      const email=document.getElementById('aEmail').value.trim().toLowerCase();
      if(!n||!name||!email){showToast('번호, 이름, 이메일 모두 입력해주세요');return;}
      if(!email.includes('@')){showToast('이메일 형식을 확인해주세요');return;}
      const id='student_'+String(n).padStart(2,'0');
      await setDoc(doc(db,'students',id),{number:n,name,email,uid:null});
      showToast(`${name} (${email}) 등록 완료 ✓`);
      document.getElementById('aN').value='';
      document.getElementById('aName').value='';
      document.getElementById('aEmail').value='';
      await loadStudents();
      document.getElementById('grid').innerHTML=renderCards();
      attachCards();
    });

    // 달력 수정/저장
    const bEdit=document.getElementById('btnCalEdit');
    const bSave=document.getElementById('btnCalSave');
    if(bEdit) bEdit.addEventListener('click',()=>{calEditMode=true;renderMain();});
    if(bSave) bSave.addEventListener('click',async()=>{
      document.querySelectorAll('textarea.cal-input').forEach(ta=>{
        calData[parseInt(ta.dataset.day)]=ta.value;
      });
      await saveCalendar();
      calEditMode=false;
      showToast('일정 저장 완료 ✓');
      renderMain();
    });
  }

  attachCards();
}

// ── 학생 개별 페이지 ──────────────────────────────────────────
async function renderStudentPage(sid){
  const student=studentList.find(s=>s.id===sid);
  if(!student){showToast('학생 정보를 찾을 수 없습니다');return;}
  const editable=canEdit(sid);
  const goals=await loadGoals(sid);
  sessionData=JSON.parse(JSON.stringify(goals));

  const weeksHtml=WEEKS.map(wk=>{
    const wD=goals[`week${wk.num}`]||{};
    const daysHtml=DAYS.map(day=>{
      const cell=wD[day.key]||{};
      return `<div class="day-cell${day.sat?' sat':''}">
        <div class="day-header">
          <span>${day.label}</span>
          ${editable?`<label class="btn-photo" style="width:auto;padding:2px 8px;margin:0;cursor:pointer">
            📷<input type="file" accept="image/*" style="display:none" class="pf" data-w="${wk.num}" data-d="${day.key}">
          </label>`:''}
        </div>
        <textarea class="day-text" data-w="${wk.num}" data-d="${day.key}"
          placeholder="${day.sat?'이번 주를 돌아보며...':'오늘의 목표를 적어요'}"
          ${editable?'':'disabled'}>${cell.text||''}</textarea>
        <div class="photo-wrap" id="ph-${wk.num}-${day.key}">
          ${cell.photoURL
            ?`<img class="photo-preview-img" src="${cell.photoURL}" alt="사진">`
            :(editable?`<label class="btn-photo" style="cursor:pointer">📷 사진 추가
              <input type="file" accept="image/*" style="display:none" class="pf" data-w="${wk.num}" data-d="${day.key}">
             </label>`:'')
          }
        </div>
      </div>`;
    }).join('');
    return `<div class="week-col ${wk.cls}">
      <div class="week-title">${wk.label}</div>
      <div class="week-dates-label">${wk.dates}</div>
      <textarea class="week-goal" data-w="${wk.num}"
        placeholder="${wk.label} 목표를 입력하세요"
        ${editable?'':'disabled'}>${wD.goal||''}</textarea>
      ${daysHtml}
    </div>`;
  }).join('');

  setApp(`
    <div class="header">
      <div class="header-left">
        <button class="btn-back" id="bk">← 목록</button>
        <div>
          <div class="header-title">${student.name} · 미라클 6월</div>
          <div class="header-sub">${editable?(isTeacher(currentUser)?'🔧 교사 수정 모드':'✏️ 내 페이지'):'👁 열람 모드'}</div>
        </div>
      </div>
      <div class="header-right">
        ${currentUser.photoURL?`<img class="user-avatar" src="${currentUser.photoURL}" referrerpolicy="no-referrer">`:''}
        <button class="btn-signout" id="bkSO">로그아웃</button>
      </div>
    </div>

    <div class="student-wrap">
      ${!editable?'<div class="view-banner">👁 열람 전용 — 자신의 페이지에서만 수정할 수 있습니다.</div>':''}
      <div class="monthly-section">
        <div class="monthly-label">🎯 6월의 목표</div>
        <textarea class="monthly-input" id="mG"
          placeholder="이번 6월에 이루고 싶은 목표를 적어보세요"
          ${editable?'':'disabled'}>${goals.monthlyGoal||''}</textarea>
      </div>
      <div class="weeks-grid">${weeksHtml}</div>
    </div>
    ${editable?'<div class="save-bar"><button class="btn-save" id="bSv">💾 저장하기</button></div>':''}
  `);

  initAutoResize();
  document.getElementById('bk').addEventListener('click',renderMain);
  document.getElementById('bkSO').addEventListener('click',()=>signOut(auth));
  if(!editable)return;

  // 사진 업로드
  document.querySelectorAll('.pf').forEach(inp=>{
    inp.addEventListener('change',async()=>{
      const file=inp.files[0]; if(!file)return;
      const w=inp.dataset.w, d=inp.dataset.d;
      showToast('사진 업로드 중... ⏳',8000);
      try{
        const url=await uploadPhoto(sid,w,d,file);
        if(!sessionData[`week${w}`])   sessionData[`week${w}`]={};
        if(!sessionData[`week${w}`][d]) sessionData[`week${w}`][d]={};
        sessionData[`week${w}`][d].photoURL=url;
        const wrap=document.getElementById(`ph-${w}-${d}`);
        if(wrap)wrap.innerHTML=`<img class="photo-preview-img" src="${url}" alt="사진">`;
        showToast('사진 업로드 완료 ✓');
      }catch(e){showToast('업로드 실패: '+e.message);}
    });
  });

  // 저장
  document.getElementById('bSv').addEventListener('click',async()=>{
    const save={};
    save.monthlyGoal=document.getElementById('mG').value;
    for(const wk of WEEKS){
      const wk_key=`week${wk.num}`;
      save[wk_key]={};
      const wg=document.querySelector(`.week-goal[data-w="${wk.num}"]`);
      save[wk_key].goal=wg?wg.value:'';
      for(const day of DAYS){
        const ex=sessionData[wk_key]?.[day.key]||{};
        const ta=document.querySelector(`.day-text[data-w="${wk.num}"][data-d="${day.key}"]`);
        save[wk_key][day.key]={text:ta?ta.value:(ex.text||''),photoURL:ex.photoURL||''};
      }
    }
    try{
      await saveGoals(sid,save);
      sessionData=JSON.parse(JSON.stringify(save));
      showToast('저장 완료 ✓');
    }catch(e){showToast('저장 실패: '+e.message);}
  });
}

// ── Auth 상태 감시 ─────────────────────────────────────────────
onAuthStateChanged(auth,async user=>{
  if(!user){currentUser=null;userProfile=null;calEditMode=false;renderLogin();return;}
  currentUser=user;

  // 교사 (학교 도메인)
  if(isTeacher(user)){
    userProfile={role:'teacher'};
    await loadStudents(); renderMain(); return;
  }

  // 학생: 이메일로 자동 매칭
  const student=await findByEmail(user.email);

  if(!student){
    // 미등록 계정
    setApp(`
      <div class="login-screen"><div class="login-card">
        <div style="font-size:52px;margin-bottom:16px">⛔</div>
        <div class="login-title" style="font-size:22px">등록되지 않은 계정</div>
        <div class="login-sub" style="margin-bottom:28px">
          <strong>${user.email}</strong><br>은 등록된 학생 이메일이 아닙니다.<br><br>
          선생님께 이메일 등록을 요청하세요.
        </div>
        <button class="btn-primary" id="bLO">로그아웃</button>
      </div></div>
    `);
    document.getElementById('bLO').addEventListener('click',()=>signOut(auth));
    return;
  }

  // UID 자동 연결 (최초 1회)
  if(!student.uid){
    await setDoc(doc(db,'students',student.id),{uid:user.uid},{merge:true});
  }
  userProfile={studentId:student.id,name:student.name,role:'student'};
  await setDoc(doc(db,'users',user.uid),userProfile,{merge:true});
  await loadStudents(); renderMain();
});
</script>
